<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Избранное — Inmo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Segoe UI, sans-serif;
    background: #f5f5f5;
}

header {
    background: #6c5ce7;
    color: #fff;
    padding: 15px;
}

.container {
    width: 90%;
    margin: auto;
    padding-top: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    padding-bottom: 30px;
}

.card {
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    text-align: center;
    transition: 0.3s;
    width: 100%;
    max-width: 220px;
    margin: 0 auto;
    padding: 0;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 320px;
    object-fit: cover;
    display: block;
}

.card h3 {
    font-size: 16px;
    padding: 12px 10px;
    margin: 0;
}

.card button {
    margin-bottom: 15px;
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    background: #6c5ce7;
    color: white;
    cursor: pointer;
}

/* Телефон */
@media (max-width:768px){

    .grid{
        grid-template-columns: repeat(2,1fr);
        gap:15px;
    }

    .card{
        max-width:100%;
    }

    .card img{
        height:250px;
    }

    .card h3{
        font-size:14px;
    }

    .card button{
        width:90%;
        font-size:13px;
    }

}

.empty {
    text-align: center;
    font-size: 20px;
    margin-top: 40px;
}
body.dark{
    background:#121212;
    color:white;
}

body.dark .card,
body.dark .container,
body.dark .login-box,
body.dark .profile-box,
body.dark .settings-box{
    background:#1e1e1e;
    color:white;
}

body.dark input,
body.dark button,
body.dark select,
body.dark textarea{
    background:#2a2a2a;
    color:white;
    border:1px solid #555;
}

body.dark header{
    background:#2c2c54;
}

body.dark footer{
    background:#1a1a1a;
    color:#ddd;
}

body.dark a{
    color:#a29bfe;
}

</style>
</head>

<body>

<header>
   <a href="Profile.html" style="color:white; font-size:18px">← Назад</a>
    <h2>Избранное</h2>
</header>



<div class="container">
    <div id="list" class="grid"></div>
    <p id="empty" class="empty">Пока ничего нет 😢</p>
</div>
<script>

if(localStorage.getItem("theme") === "dark"){

    document.body.classList.add("dark");

}

</script>
    
<script>
let list = document.getElementById("list");
let empty = document.getElementById("empty");

function getData() {
    return JSON.parse(localStorage.getItem("favorites")) || [];
}

function saveData(data) {
    localStorage.setItem("favorites", JSON.stringify(data));
}

function render() {
    let data = getData();
    list.innerHTML = "";

    if (data.length === 0) {
        empty.style.display = "block";
        return;
    } else {
        empty.style.display = "none";
    }

    data.forEach((item, index) => {
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${item.img}">
            <h3>${item.title}</h3>
            <button onclick="removeItem(${index})">❌ Удалить</button>
        `;
function saveFrom() {
    localStorage.setItem("fromPage", "favorites");
}

        list.appendChild(div);
    });
}

function removeItem(index) {
    let data = getData();

    data.splice(index, 1); 

    saveData(data);
    render(); // ОБЯЗАТЕЛЬНО
}

render();
</script>


</body>
</html>
