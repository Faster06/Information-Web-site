<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Избранное — Inmo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Segoe UI, sans-serif;
    background: #f5f5f5;
}

header {
    background: #6c5ce7;
    color: #fff;
    padding: 15px;
}

.container {
    width: 90%;
    margin: auto;
    padding-top: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
}

.card {
    background: #fff;
    padding: 10px;
    border-radius: 12px;
    text-align: center;
}

.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 10px;
}

.empty {
    text-align: center;
    font-size: 20px;
    margin-top: 40px;
}
</style>
</head>

<body>

<header>
   <a href="Profile.html" style="color:white; font-size:18px">← Назад</a>

</a>
    <h2>Избранное</h2>
</header>



<div class="container">
    <div id="list" class="grid"></div>
    <p id="empty" class="empty">Пока ничего нет 😢</p>
</div>
<script>

if(localStorage.getItem("theme") === "dark"){

    document.body.classList.add("dark");

}

</script>
    
<script>
let list = document.getElementById("list");
let empty = document.getElementById("empty");

function getData() {
    return JSON.parse(localStorage.getItem("favorites")) || [];
}

function saveData(data) {
    localStorage.setItem("favorites", JSON.stringify(data));
}

function render() {
    let data = getData();
    list.innerHTML = "";

    if (data.length === 0) {
        empty.style.display = "block";
        return;
    } else {
        empty.style.display = "none";
    }

    data.forEach((item, index) => {
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${item.img}">
            <h3>${item.title}</h3>
            <button onclick="removeItem(${index})">❌ Удалить</button>
        `;
function saveFrom() {
    localStorage.setItem("fromPage", "favorites");
}

        list.appendChild(div);
    });
}

function removeItem(index) {
    let data = getData();

    data.splice(index, 1); 

    saveData(data);
    render(); // ОБЯЗАТЕЛЬНО
}

render();
</script>


</body>
</html>
