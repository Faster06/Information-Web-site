<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Золотая коллекция</title>
<style>
body{font-family:Segoe UI;background:#f5f5f5;margin:0;padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;}
.card{background:#fff;padding:10px;border-radius:12px;}
img{width:100%;border-radius:10px;}
</style>
</head>
<body>

<h1>Золотая коллекция</h1>
<div class="grid" id="list"></div>

<script>
const movies = JSON.parse(localStorage.getItem("moviesData"));

const goldMovies = movies.filter(m => m.category === "gold");

goldMovies.forEach(m => {
    document.getElementById("list").innerHTML += `
        <div class="card">
            <a href="${m.link || '#'}">
                <img src="${m.img}">
                <h3>${m.title}</h3>
            </a>
        </div>
    `;
});
</script>

</body>
</html>
