<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Inmo — Создать аккаунт</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family:"Segoe UI", sans-serif;
    background:#f5f5f5;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

.register-box{
    width:90%;
    max-width:420px;

    background:#fff;
    padding:35px;

    border-radius:22px;

    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    margin:0;
    color:#6c5ce7;
    font-size:38px;
}

.logo p{
    color:#777;
    margin-top:5px;
}

.input-box{
    margin-bottom:18px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    color:#444;
    font-weight:500;
}

.input-wrap{
    position:relative;
}

.input-wrap i{
    position:absolute;
    top:14px;
    left:14px;
    color:#999;
}

.input-wrap input{
    width:100%;
    padding:13px 13px 13px 42px;

    border-radius:12px;
    border:1px solid #ddd;

    font-size:15px;
    box-sizing:border-box;
}

.input-wrap input:focus{
    outline:none;
    border-color:#6c5ce7;
}

.register-btn{
    width:100%;
    padding:14px;

    border:none;
    border-radius:12px;

    background:#6c5ce7;
    color:white;

    font-size:16px;
    cursor:pointer;

    transition:0.3s;
}

.register-btn:hover{
    background:#5a4bd6;
}

.bottom-text{
    text-align:center;
    margin-top:20px;
    color:#666;
}

.bottom-text a{
    color:#6c5ce7;
    text-decoration:none;
    font-weight:600;
}

.error{
    color:#e74c3c;
    margin-bottom:15px;
    display:none;
}

.success{
    color:#27ae60;
    margin-bottom:15px;
    display:none;
}

body.dark{
    background:#121212;
}

body.dark .register-box{
    background:#1e1e1e;
}

body.dark input{
    background:#2a2a2a;
    color:white;
    border:1px solid #555;
}

body.dark label,
body.dark .bottom-text,
body.dark .logo p{
    color:#ddd;
}

</style>
</head>

<body>

<div class="register-box">

    <div class="logo">
        <h1>Inmo</h1>
        <p>Создание аккаунта</p>
    </div>

    <div class="error" id="error">
        Заполните все поля
    </div>

    <div class="success" id="success">
        Аккаунт успешно создан!
    </div>

    <div class="input-box">
        <label>Имя</label>

        <div class="input-wrap">
            <i class="fa fa-user"></i>

            <input
                type="text"
                id="name"
                placeholder="Ваше имя"
            >
        </div>
    </div>

    <div class="input-box">
        <label>Email</label>

        <div class="input-wrap">
            <i class="fa fa-envelope"></i>

            <input
                type="email"
                id="email"
                placeholder="example@mail.com"
            >
        </div>
    </div>

    <div class="input-box">
        <label>Пароль</label>

        <div class="input-wrap">
            <i class="fa fa-lock"></i>

            <input
                type="password"
                id="password"
                placeholder="Введите пароль"
            >
        </div>
    </div>

    <button class="register-btn" onclick="register()">
        Создать аккаунт
    </button>

    <div class="bottom-text">
        Уже есть аккаунт?
        <a href="login.html">Войти</a>
    </div>

</div>

<script>

// ТЕМНАЯ ТЕМА
if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
}

// АВТО ПЕРЕВОД
const lang = localStorage.getItem("language");

if(lang === "en"){

    document.querySelector(".logo p").innerText =
        "Create Account";

    document.querySelectorAll("label")[0].innerText =
        "Name";

    document.querySelectorAll("label")[1].innerText =
        "Email";

    document.querySelectorAll("label")[2].innerText =
        "Password";

    document.getElementById("name").placeholder =
        "Your name";

    document.getElementById("password").placeholder =
        "Enter password";

    document.querySelector(".register-btn").innerText =
        "Create Account";

    document.querySelector(".bottom-text").innerHTML =
        `Already have an account?
        <a href="login.html">Login</a>`;

    document.getElementById("error").innerText =
        "Fill in all fields";

    document.getElementById("success").innerText =
        "Account created successfully!";
}

// РЕГИСТРАЦИЯ
function register(){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(!name || !email || !password){

        document.getElementById("error").style.display = "block";
        return;
    }

    localStorage.setItem("userName", name);
    localStorage.setItem("userEmail", email);
    localStorage.setItem("userPassword", password);

    document.getElementById("success").style.display = "block";

    setTimeout(() => {

        window.location.href = "index.html";

    }, 1000);
}

</script>
</body>
</html>
