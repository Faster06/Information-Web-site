<!DOCTYPE html>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #f5f5f5;
}


header {
    background: #6c5ce7;
    padding: 15px 20px;
}


.search-bar {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    background: white;
    border-radius: 12px;
    padding: 5px 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

.search-bar i {
    color: #6c5ce7;
    font-size: 18px;
    margin-right: 8px;
}

.search-bar input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
}


.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    padding-bottom: 30px;
}

.card {
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    text-align: center;
    transition: 0.3s;
    width: 100%;
    max-width: 220px;
    margin: 0 auto;
    padding: 0;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 320px;
    object-fit: cover;
    display: block;
}

.card h3 {
    font-size: 16px;
    padding: 12px 10px;
    margin: 0;
}

.card button {
    margin-bottom: 15px;
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    background: #6c5ce7;
    color: white;
    cursor: pointer;
}



/* ПУСТО */
#empty {
    text-align: center;
    margin-top: 40px;
    color: #777;
}
body.dark{
    background:#121212;
    color:white;
}

body.dark .card,
body.dark .container,
body.dark .login-box,
body.dark .profile-box,
body.dark .settings-box{
    background:#1e1e1e;
    color:white;
}

@media (max-width: 768px){

    body{
        overflow-x:hidden;
    }

    .container{
        padding:15px;
    }

    /* HEADER */

    header{
        flex-direction:column;
        align-items:center;
        gap:15px;
        padding:20px 15px;
    }

    header h1{
        position:static;
        margin-bottom:5px;
        font-size:24px;
    }

    /* MENU */

    .menu-buttons{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:10px;
        width:100%;
    }

    .menu-buttons a{
        padding:10px 14px;
        border-radius:10px;

        display:flex;
        align-items:center;
        justify-content:center;
        gap:6px;

        font-size:13px;

        flex:1 1 40%;
    }

    /* HERO */

    .hero{
        padding:30px 15px;
        border-radius:15px;
    }

    .hero h1{
        font-size:26px;
        line-height:34px;
    }

    .hero p{
        font-size:15px;
    }

    /* FILTERS */

    .filters{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:10px;
    }

    .filters button{
        flex:1 1 40%;
    }



body.dark input,
body.dark button,
body.dark select,
body.dark textarea{
    background:#2a2a2a;
    color:white;
    border:1px solid #555;
}

body.dark header{
    background:#2c2c54;
}

body.dark footer{
    background:#1a1a1a;
    color:#ddd;
}

body.dark a{
    color:#a29bfe;
}

</style>
</head>
