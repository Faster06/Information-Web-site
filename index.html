      body {

         .hero {
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    color: white;
    padding: 40px 20px;
    border-radius: 20px;
    text-align: center;
    margin-bottom: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.hero h1 {
    margin: 0;
    font-size: 32px;
}

.hero p {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.9;
}

.hero {
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
     .hero button {
    margin-top: 15px;
    background: white;
    color: #6c5ce7;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;

    font-weight: bold;
}
 
.filters {

}

.filters button {

    padding: 8px 15px;
    border: none;
    border-radius: 10px;
    background: #6c5ce7;
    color: white;
    cursor: pointer;
}

.filters button:hover {
    background: #5a4fd6;
}

@media (max-width: 768px){

        gap: 8px;

    .filters button{

<script>
function renderMovies() {

    const counters = {
        new: 0,
        gold: 0,
        recommendations: 0
    };

    movies.forEach(movie => {

        const category = movie.category;

        if (!document.getElementById(category)) return;

        if (category === "new" || category === "gold") {
            if (counters[category] >= 3) return;
            counters[category]++;
        }

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <a href="${movie.link || '#'}" style="text-decoration:none; color:inherit;">
                <img src="${movie.img}">
                <h3>${movie.title}</h3>
                <div class="rating">⭐ ${movie.rating ?? "—"}</div>
            </a>
        `;

        document.getElementById(category).appendChild(card);
    });
}
renderMovies();
</script>
