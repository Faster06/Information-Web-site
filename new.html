<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новинки</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(180deg,#f5f5f5,#e9e9ff);
    color:#222;
}

/* HEADER */
header{
    background:#6c5ce7;
    padding:12px 20px;
}

header a{
    color:white;
    text-decoration:none;
    font-size:16px;
    font-weight:600;
}

/* TITLE */
h1{
    text-align:center;
    margin:25px 0;
    font-size:28px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:16px;
    padding:0 20px 40px;
}

/* CARD */
.card{
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
    transition:0.25s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    height:240px;
    object-fit:cover;
    display:block;
}

.card h3{
    font-size:14px;
    margin:10px;
    line-height:1.3;
}

/* RESPONSIVE */
@media (max-width:768px){
    .grid{
        grid-template-columns:repeat(3, 1fr);
        gap:10px;
    }

    .card img{
        height:160px;
    }

    .card h3{
        font-size:11px;
    }

    h1{
        font-size:20px;
    }
}
</style>
</head>

<body>

<header>
    <a href="index.html">← Назад</a>
</header>

<h1>🔥 Новинки</h1>

<div class="grid" id="list"></div>

<script>
const movies = JSON.parse(localStorage.getItem("moviesData")) || [];

const newMovies = movies.filter(m => m.category === "new");

newMovies.forEach(m => {
    document.getElementById("list").innerHTML += `
        <div class="card">
            <a href="${m.link || '#'}" style="text-decoration:none; color:inherit;">
                <img src="${m.img}">
                <h3>${m.title}</h3>
            </a>
        </div>
    `;
});
</script>

</body>
</html>
