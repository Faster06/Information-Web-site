<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Новинки</title>
<style>
body{font-family:Segoe UI;background:#f5f5f5;margin:0;padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;}
.card{background:#fff;padding:10px;border-radius:12px;}
img{width:100%;border-radius:10px;}
</style>
</head>
<body>

<h1>Новинки</h1>
<div class="grid" id="list"></div>
<script>
    {
    title: "Дюна 2",
    img: "dune2.jpg",
    rating: 8.9,
    category: "new",
    genre: "movie",
    link: "dune2.html"
},

{
    title: "Аркейн",
    img: "arcane.jpg",
    rating: 9.0,
    category: "new",
    genre: "serial",
    link: "arcane.html"
},

{
    title: "Человек-бензопила",
    img: "chainsawman.jpg",
    rating: 8.8,
    category: "new",
    genre: "anime",
    link: "chainsawman.html"
},

{
    title: "Головоломка 2",
    img: "insideout2.jpg",
    rating: 8.5,
    category: "new",
    genre: "cartoon",
    link: "insideout2.html"
},

{
    title: "Fallout",
    img: "fallout.jpg",
    rating: 8.7,
    category: "new",
    genre: "serial",
    link: "fallout.html"
}

     
];
<script>
const movies = JSON.parse(localStorage.getItem("moviesData"));

const newMovies = movies.filter(m => m.category === "new");

newMovies.forEach(m => {
    document.getElementById("list").innerHTML += `
        <div class="card">
            <a href="${m.link || '#'}">
                <img src="${m.img}">
                <h3>${m.title}</h3>
            </a>
        </div>
    `;
});
</script>

</body>
</html>
