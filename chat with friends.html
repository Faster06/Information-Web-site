<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Чат — Inmo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Segoe UI, sans-serif;
    background: #f5f5f5;
}
header {
    background: #6c5ce7;
    color: #fff;
    padding: 15px;
}
.chat {
    padding: 15px;
    height: 70vh;
    overflow-y: auto;
}
.msg {
    background: #fff;
    padding: 10px 14px;
    border-radius: 12px;
    margin-bottom: 10px;
    max-width: 70%;
}
.me { background: #dfe6fd; margin-left: auto; }

.input-box {
    display: flex;
    padding: 10px;
    background: #fff;
}
input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}
button {
    margin-left: 10px;
    background: #6c5ce7;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
}
body.dark {
    background: #121212;
    color: #eee;
}

body.dark header {
    background: #2c2c54;
}

body.dark .container,
body.dark .card,
body.dark .friend-card,
body.dark .settings-block {
    background: #1e1e1e;
    color: #eee;
}

body.dark input,
body.dark button {
    background: #2a2a2a;
    color: white;
    border: 1px solid #555;
}
</style>
</head>

<body>

<header>
    <a href="page friends.html" style="color:white; font-size:18px">← Назад</a>

</header>

<div class="chat" id="chat">
    <div class="msg">Привет 👋</div>
    <div class="msg me">Какой фильм посоветуешь?</div>
</div>

<div class="input-box">
    <input id="text" placeholder="Сообщение...">
    <button onclick="send()">Отправить</button>
</div>
<script>
const switcher = document.getElementById("themeSwitch");

if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
    switcher.checked = true;
}

switcher.addEventListener("change", () => {
    if (switcher.checked) {
        document.body.classList.add("dark");
        localStorage.setItem("theme", "dark");
    } else {
        document.body.classList.remove("dark");
        localStorage.setItem("theme", "light");
    }
});
</script>


</body>
</html>
