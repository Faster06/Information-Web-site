<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — Inmo</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f5f5f5;
        }

        header {
            background: #6c5ce7;
            text-decoration:none;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 26px;
        }

        .container {
            width: 90%;
            margin: auto;
            margin-top: 30px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .profile-header img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 4px solid #6c5ce7;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: #6c5ce7;
            color: white;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background: #5846d3;
        }
       .logout-btn{
    width:100%;
    padding: 12px 16px;
    margin-top:20px;

    border:none;
    border-radius:10px;

    background:#e74c3c;
    color:white;

    font-size:18px;
    font-weight:500;

    cursor:pointer;
    transition:0.3s;
}

.logout-btn:hover{
    background:#d63b2b;
    transform:scale(1.01);
}

.logout-btn i{
    margin-right:15px;
}

.edit-btn{
    width:100%;

    padding:18px;

    border:none;
    border-radius:16px;

    background:#6c5ce7;
    color:white;

    font-size:18px;
    cursor:pointer;

    margin-bottom:20px;

    transition:0.3s;
}

.edit-btn:hover{
    background:#5a4fd6;
}
body.dark{
    background:#121212;
    color:white;
}

body.dark .card,
body.dark .container,
body.dark .login-box,
body.dark .profile-box,
body.dark .settings-box{
    background:#1e1e1e;
    color:white;
}

body.dark input,
body.dark button,
body.dark select,
body.dark textarea{
    background:#2a2a2a;
    color:white;
    border:1px solid #555;
}

body.dark header{
    background:#2c2c54;
}

body.dark footer{
    background:#1a1a1a;
    color:#ddd;
}

body.dark a{
    color:#a29bfe;
}


    </style>
</head>

<body>

<header>
        <a href="index.html" style="color:white; font-size:18px">← Назад</a>
</header>

<div class="container">

    <div class="profile-header">
        <img src="avatar.jpg" alt="Аватар">
        <h2>Ваш профиль</h2>
        <p>ID: 102921</p>
    </div>

  <button class="btn" onclick="window.location.href='edit profile.html'">
        <i class="fa fa-pen"></i> Редактировать профиль
    </button>

   
    <button class="btn" onclick="window.location.href='favorites.html'">
        <i class="fa fa-heart"></i> Избранное
    </button>
   
    
 <button class="logout-btn" onclick="logout()">
    <i class="fa fa-sign-out-alt"></i>
    Выйти из аккаунта
</button>

<script>
function logout(){

    localStorage.removeItem("userName");
    localStorage.removeItem("userEmail");

    window.location.href = "login.html";
}
</script>

</body>
</html>
